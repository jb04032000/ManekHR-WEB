<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44" role="img" aria-label="ManekHR loading">
  <!-- ManekHR gem loader: a gold "stitch" marches around an emerald gem.
       Brand colours emerald #0B6E4F + gold #C49A2E. SMIL animations run while
       embedded via <img> in components/ui/ManekHRStitchLoader.tsx. -->
  <!-- emerald gem body -->
  <polygon points="22,5 36,16 22,40 8,16" fill="#0B6E4F"/>
  <!-- lighter top table facet, shimmers to read as "working" -->
  <polygon points="22,5 15,16 29,16" fill="#0E8A63">
    <animate attributeName="opacity" values="0.7;1;0.7" dur="1.6s"
      repeatCount="indefinite" calcMode="spline"
      keyTimes="0;0.5;1" keySplines="0.45 0 0.55 1;0.45 0 0.55 1"/>
  </polygon>
  <!-- gold facet lines -->
  <g fill="none" stroke="#C49A2E" stroke-width="1.1" stroke-linejoin="round" stroke-linecap="round">
    <polyline points="8,16 36,16"/>
    <polyline points="15,16 22,40 29,16"/>
    <polyline points="22,5 15,16"/>
    <polyline points="22,5 29,16"/>
  </g>
  <!-- gold stitch marching around the gem outline (the "stitch loop").
       dashoffset end (-26) is 4x the 6.5 dash period, so the loop is seamless. -->
  <polygon points="22,5 36,16 22,40 8,16" fill="none" stroke="#C49A2E"
    stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="2.5 4">
    <animate attributeName="stroke-dashoffset" values="0;-26" dur="1.1s"
      repeatCount="indefinite"/>
  </polygon>
</svg>
